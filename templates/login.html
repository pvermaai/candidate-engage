{% extends "base.html" %}
{% block title %}Admin Login — Wissen Recruit AI{% endblock %}

{% block content %}
<div class="max-w-sm mx-auto px-4 py-24">
  <div class="bg-white rounded-2xl border border-surface-200 p-8">
    <div class="text-center mb-6">
      <div class="w-12 h-12 rounded-xl bg-brand-600 flex items-center justify-center mx-auto mb-3">
        <span class="text-white text-lg font-semibold">W</span>
      </div>
      <h1 class="text-xl font-semibold text-slate-900">Admin Login</h1>
      <p class="text-sm text-slate-400 mt-1">Sign in to access the admin panel</p>
    </div>

    {% if error %}
    <div class="bg-red-50 text-red-700 text-sm px-4 py-2.5 rounded-lg mb-4">
      {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="{{ url_for('admin_login') }}">
      <div class="mb-4">
        <label class="block text-xs font-medium text-slate-500 mb-1.5">User ID</label>
        <input type="text" name="user_id" required autofocus
               class="w-full border border-surface-200 rounded-lg px-3 py-2.5 text-sm bg-surface-50 focus:border-brand-500"
               placeholder="Enter your user ID">
      </div>
      <div class="mb-4">
        <label class="block text-xs font-medium text-slate-500 mb-1.5">Password</label>
        <input type="password" name="password" required
               class="w-full border border-surface-200 rounded-lg px-3 py-2.5 text-sm bg-surface-50 focus:border-brand-500"
               placeholder="Enter your password">
      </div>
      <button type="submit"
              class="w-full bg-brand-600 hover:bg-brand-700 text-white font-medium py-2.5 rounded-xl transition text-sm">
        Sign In
      </button>
    </form>

    <div class="mt-4 text-center">
      <a href="/" class="text-xs text-slate-400 hover:text-slate-600">&larr; Back to roles</a>
    </div>
  </div>
</div>
{% endblock %}
